<svg width="1024" height="1024" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="depthBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#3f3f46;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#18181b;stop-opacity:1" />
        </linearGradient>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5"/>
            </feComponentTransfer>
            <feMerge> 
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/> 
            </feMerge>
        </filter>
        <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="120" height="120" fill="url(#depthBg)"/>
    <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.05"/>
    <circle cx="110" cy="80" r="1" fill="#ffffff" opacity="0.05"/>
    <circle cx="50" cy="110" r="1" fill="#ffffff" opacity="0.05"/>
    <g filter="url(#dropShadow)" transform="translate(0, -2)">
        <path d="M25 35 L65 65 L25 95" fill="none" stroke="url(#symbolGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="75" y="80" width="25" height="14" rx="4" fill="url(#symbolGrad)"/>
    </g>
</svg>
